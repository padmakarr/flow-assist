<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reminder</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .reminder-popup-page {
      box-sizing: border-box;
      margin: 0;
      min-height: 100vh;
      padding: 22px 22px 20px;
      background: linear-gradient(155deg, var(--bg-surface-raised) 0%, var(--bg-content) 55%, var(--bg-surface) 100%);
      color: var(--text-primary);
      font-family: inherit;
    }
    .reminder-popup-hero {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 22px;
    }
    .reminder-popup-bell {
      flex-shrink: 0;
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      background: color-mix(in srgb, var(--accent-blue-muted, #3b82f6) 18%, transparent);
      border: 1px solid color-mix(in srgb, var(--border-muted) 65%, var(--accent-blue-muted, #3b82f6) 40%);
      color: var(--accent-blue-bright, #60a5fa);
    }
    .reminder-popup-bell--shake {
      transform-origin: 50% 0;
      animation: reminderPopupBellShake 1.1s ease-in-out infinite;
    }
    @keyframes reminderPopupBellShake {
      0%, 100% { transform: rotate(0deg) translateX(0); }
      15% { transform: rotate(18deg) translateX(2px); }
      30% { transform: rotate(-16deg) translateX(-3px); }
      45% { transform: rotate(14deg) translateX(2px); }
      60% { transform: rotate(-10deg) translateX(-2px); }
      75% { transform: rotate(6deg) translateX(1px); }
    }
    .reminder-popup-copy {
      min-width: 0;
      flex: 1;
    }
    .reminder-popup-title {
      margin: 0 0 6px;
      font-size: 1.28rem;
      font-weight: 650;
      letter-spacing: -0.025em;
      line-height: 1.25;
    }
    .reminder-popup-sub {
      margin: 0;
      font-size: var(--font-sm);
      line-height: 1.45;
      color: var(--text-muted);
    }
    .reminder-popup-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .reminder-popup-actions .btn-small,
    .reminder-popup-actions .btn-primary {
      font-weight: 600;
    }
  </style>
</head>
<body class="reminder-popup-page">
  <header class="reminder-popup-hero">
    <div class="reminder-popup-bell reminder-popup-bell--shake" aria-hidden="true">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
    </div>
    <div class="reminder-popup-copy">
      <h1 class="reminder-popup-title" id="reminder-title">Reminder</h1>
      <p class="reminder-popup-sub">When you are ready, open the note or snooze for a few minutes.</p>
    </div>
  </header>
  <div class="reminder-popup-actions">
    <button type="button" class="btn-primary" id="reminder-btn-open">Open note</button>
    <button type="button" class="btn-small" id="reminder-btn-dismiss">Dismiss</button>
    <button type="button" class="btn-small" data-snooze="5">Snooze 5m</button>
    <button type="button" class="btn-small" data-snooze="15">Snooze 15m</button>
    <button type="button" class="btn-small" data-snooze="60">Snooze 1h</button>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var noteId = params.get('noteId') || '';
      var reminderId = params.get('reminderId') || '';
      var title = params.get('title') || 'Reminder';
      var titleEl = document.getElementById('reminder-title');
      if (titleEl) titleEl.textContent = title;
      function send(action, extras) {
        var p = Object.assign({ action: action, noteId: noteId, reminderId: reminderId }, extras || {});
        if (window.taskAPI && window.taskAPI.reminderPopupAction) {
          window.taskAPI.reminderPopupAction(p);
        }
      }
      document.getElementById('reminder-btn-dismiss').addEventListener('click', function () {
        send('dismiss');
      });
      document.getElementById('reminder-btn-open').addEventListener('click', function () {
        send('open');
      });
      document.querySelectorAll('[data-snooze]').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var m = parseInt(btn.getAttribute('data-snooze'), 10);
          send('snooze', { minutes: isNaN(m) ? 15 : m });
        });
      });
    })();
  </script>
</body>
</html>
